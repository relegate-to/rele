services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rele
      POSTGRES_PASSWORD: rele
      POSTGRES_DB: rele
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gate:
    image: oven/bun:1
    working_dir: /app/gate
    ports:
      - "3001:3001"
    env_file:
      - ./gate/.env.local
    volumes:
      - ./gate:/app/gate
      - ./db:/app/db
      - ./package.json:/app/package.json
      - ./bun.lock:/app/bun.lock
    command: sh -c "cd /app && bun install && bun run --hot gate/src/index.ts"
    depends_on:
      - postgres

volumes:
  postgres_data:
