services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - gate

  gate:
    build:
      context: ./gate
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./gate/.env
