services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    volumes:
      - ./web:/app
      - ./.docker-cache/next:/app/.next/cache
    command: sh -c "bun install && bun run dev"
    depends_on:
      - gate

  gate:
    build:
      context: ./gate
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./gate/.env.local
    volumes:
      - ./gate:/app
    command: sh -c "bun install && bun run dev"
    depends_on:
      db:
        condition: service_healthy

  auth:
    container_name: supabase-auth
    image: public.ecr.aws/supabase/gotrue:v2.186.0
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:9999/health
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./db/.env.local

  db:
    container_name: supabase-db
    image: public.ecr.aws/supabase/postgres:17.6.1.075
    restart: unless-stopped
    ports:
      - "54322:5432"
    env_file:
      - ./db/.env.local
    volumes:
      - ./db/supabase/volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:Z
      - ./db/supabase/volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:Z
      - ./db/supabase/volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./db/supabase/volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./db/supabase/volumes/db/_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:Z
      - ./db/supabase/volumes/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:Z
      - supabase-db-data:/var/lib/postgresql/data:Z
      - supabase-db-config:/etc/postgresql-custom
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal

volumes:
  supabase-db-data:
  supabase-db-config:
