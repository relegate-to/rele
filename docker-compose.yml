services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    volumes:
      - ./web:/app
      - ./.docker-cache/next:/app/.next/cache
    command: sh -c "bun install && bun run dev"
    depends_on:
      - gate

  gate:
    build:
      context: ./gate
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./gate/.env.local
    volumes:
      - ./gate:/app
    command: sh -c "bun install && bun run dev"
    depends_on:
      db:
        condition: service_healthy

  auth:
    container_name: supabase-auth
    image: public.ecr.aws/supabase/gotrue:v2.186.0
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:9999/health
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./db/.env.local
