# fly.toml app configuration file generated for rele on 2026-03-12T09:20:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rele'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"

[processes]
  api = "bun run gate/src/index.ts"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['api']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  processes = ['api']
